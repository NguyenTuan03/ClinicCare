# PostgreSQL configuration
#
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("DATABASE_USERNAME") { "postgres" } %>
  password: <%= ENV.fetch("DATABASE_PASSWORD") { "postgres" } %>
  host: <%= ENV.fetch("DATABASE_HOST") { "localhost" } %>
  port: <%= ENV.fetch("DATABASE_PORT") { 5432 } %>

development:
  <<: *default
  database: clinic_care_development

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: clinic_care_test

# Store production database on PostgreSQL. Solid Cache, Solid Queue, and Solid Cable
# share the primary production database as agreed.
production:
  primary:
    <<: *default
    database: clinic_care_production
    username: <%= ENV.fetch("DATABASE_USERNAME") %>
    password: <%= ENV.fetch("DATABASE_PASSWORD") %>
    host: <%= ENV.fetch("DATABASE_HOST") %>
  cache:
    <<: *default
    database: clinic_care_production
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: clinic_care_production
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: clinic_care_production
    migrations_paths: db/cable_migrate
